name: Build and Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_windows_arm:
        description: "Build Windows ARM64 (requires a custom JavaFX SDK URL)"
        required: false
        default: "false"
      windows_arm_javafx_url:
        description: "Direct URL to a Windows ARM64 JavaFX SDK zip"
        required: false
        default: ""

permissions:
  contents: write

env:
  APP_NAME: Sudo
  APP_VERSION: 1.0.0
  MODULE_NAME: com.sudo.app
  MAIN_CLASS: com.sudo.Main
  JAVAFX_VERSION: 17.0.17
  PACKAGE_VENDOR: Panpan

jobs:
  build:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            platform: windows
            arch: x64
            javafx_platform: windows-x64
            package_type: app-image
            icon: sudoku_icon.ico
            ext: zip
          - runner: macos-15-intel
            platform: macos
            arch: x64
            javafx_platform: osx-x64
            package_type: dmg
            icon: Sudoku.icns
            ext: dmg
          - runner: macos-15
            platform: macos
            arch: arm64
            javafx_platform: osx-aarch64
            package_type: dmg
            icon: Sudoku.icns
            ext: dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install WiX Toolset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress
          "C:\Program Files (x86)\WiX Toolset v3.11\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Download JavaFX SDK
        shell: bash
        env:
          JAVAFX_PLATFORM: ${{ matrix.javafx_platform }}
          JAVAFX_SDK_URL: ${{ github.event.inputs.windows_arm_javafx_url }}
        run: |
          set -euo pipefail
          base="https://download2.gluonhq.com/openjfx/${JAVAFX_VERSION}"
          dest="build/javafx"
          mkdir -p "$dest"

          if [[ -n "${JAVAFX_SDK_URL:-}" ]]; then
            url="$JAVAFX_SDK_URL"
            echo "Downloading JavaFX SDK from $url"
            curl -fL "$url" -o "$dest/javafx.zip"
          else
          candidates=()
          if [[ "$JAVAFX_PLATFORM" == osx-* ]]; then
            arch="${JAVAFX_PLATFORM#osx-}"
            candidates+=("openjfx-${JAVAFX_VERSION}_osx-${arch}_bin-sdk.zip")
            candidates+=("openjfx-${JAVAFX_VERSION}_macos-${arch}_bin-sdk.zip")
          else
            candidates+=("openjfx-${JAVAFX_VERSION}_${JAVAFX_PLATFORM}_bin-sdk.zip")
          fi

          downloaded=""
          for name in "${candidates[@]}"; do
            url="$base/$name"
            echo "Trying $url"
            if curl -fL "$url" -o "$dest/javafx.zip"; then
              downloaded="$name"
              break
            fi
          done

          if [[ -z "$downloaded" ]]; then
            echo "Failed to download JavaFX SDK for $JAVAFX_PLATFORM"
            exit 1
          fi
          fi

          if command -v unzip >/dev/null 2>&1; then
            unzip -q "$dest/javafx.zip" -d "$dest"
          else
            7z x "$dest/javafx.zip" "-o$dest" > /dev/null
          fi
          sdk_dir=$(find "$dest" -maxdepth 1 -type d -name "javafx-sdk-*")
          if [[ -z "$sdk_dir" ]]; then
            echo "JavaFX SDK not found after unzip"
            exit 1
          fi
          echo "JAVAFX_SDK_DIR=$sdk_dir" >> "$GITHUB_ENV"

      - name: Package app
        shell: bash
        env:
          PACKAGE_TYPE: ${{ matrix.package_type }}
          PACKAGE_ICON: ${{ matrix.icon }}
          PACKAGE_DESCRIPTION: "Sudoku Game for ${{ matrix.platform }} ${{ matrix.arch }}"
        run: |
          chmod +x scripts/ci/build-package.sh
          scripts/ci/build-package.sh

      - name: Collect artifact
        shell: bash
        run: |
          set -euo pipefail
          pkg_dir="build/installer"
          mkdir -p dist
          if [[ -d "$pkg_dir/$APP_NAME.app" ]]; then
            base="$APP_NAME.app"
          elif [[ -d "$pkg_dir/$APP_NAME" ]]; then
            base="$APP_NAME"
          else
            base=""
          fi

          if [[ -n "$base" ]]; then
            out="dist/${APP_NAME}-${APP_VERSION}-${{ matrix.platform }}-${{ matrix.arch }}.zip"
            tar -a -cf "$out" -C "$pkg_dir" "$base"
            exit 0
          fi

          file=$(ls "$pkg_dir" | grep -E "\\.${{ matrix.ext }}$" | head -n 1)
          if [[ -z "$file" ]]; then
            echo "No package found in $pkg_dir"
            exit 1
          fi
          cp "$pkg_dir/$file" "dist/${APP_NAME}-${APP_VERSION}-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly build
          prerelease: true
          files: dist/*

  build_windows_arm:
    name: Build windows arm64
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_windows_arm == 'true' }}
    runs-on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download JavaFX SDK (Windows ARM64)
        shell: bash
        env:
          JAVAFX_SDK_URL: ${{ inputs.windows_arm_javafx_url }}
        run: |
          set -euo pipefail
          if [[ -z "${JAVAFX_SDK_URL:-}" ]]; then
            echo "windows_arm_javafx_url is required for Windows ARM64 builds."
            exit 1
          fi
          dest="build/javafx"
          mkdir -p "$dest"
          echo "Downloading JavaFX SDK from $JAVAFX_SDK_URL"
          curl -fL "$JAVAFX_SDK_URL" -o "$dest/javafx.zip"
          if command -v unzip >/dev/null 2>&1; then
            unzip -q "$dest/javafx.zip" -d "$dest"
          else
            7z x "$dest/javafx.zip" "-o$dest" > /dev/null
          fi
          sdk_dir=$(find "$dest" -maxdepth 1 -type d -name "javafx-sdk-*")
          if [[ -z "$sdk_dir" ]]; then
            echo "JavaFX SDK not found after unzip"
            exit 1
          fi
          echo "JAVAFX_SDK_DIR=$sdk_dir" >> "$GITHUB_ENV"

      - name: Package app
        shell: bash
        env:
          PACKAGE_TYPE: app-image
          PACKAGE_ICON: sudoku_icon.ico
          PACKAGE_DESCRIPTION: "Sudoku Game for windows arm64"
        run: |
          chmod +x scripts/ci/build-package.sh
          scripts/ci/build-package.sh

      - name: Collect artifact
        shell: bash
        run: |
          set -euo pipefail
          pkg_dir="build/installer"
          mkdir -p dist
          if [[ -d "$pkg_dir/$APP_NAME" ]]; then
            base="$APP_NAME"
          else
            echo "No app image found in $pkg_dir"
            exit 1
          fi
          out="dist/${APP_NAME}-${APP_VERSION}-windows-arm64.zip"
          tar -a -cf "$out" -C "$pkg_dir" "$base"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: dist/*
